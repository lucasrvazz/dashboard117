<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard MED 117</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1f3d;--navy-light:#244080;
  --teal:#0d9488;--teal-l:#14b8a6;
  --sky:#0284c7;--violet:#7c3aed;--rose:#e11d48;
  --slate:#64748b;--slate-l:#94a3b8;
  --bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#1e293b;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;padding-bottom:50px}

/* ── ANIMAÇÕES GERAIS ── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes growBar { from { width: 0; } }

/* ── LOADING & LOGIN ── */
#loading-screen, #login-screen{position:fixed;inset:0;background:linear-gradient(135deg,var(--navy),var(--navy-light));display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:16px}
#login-screen{display:none;padding:24px;z-index:999}
.spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,.2);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:rgba(255,255,255,.5);font-size:.78rem;font-family:'DM Mono',monospace}
.login-card{text-align:center;color:white;max-width:320px;width:100%}
.login-emoji{font-size:2.8rem;margin-bottom:14px}
.login-title{font-size:1.25rem;font-weight:700;margin-bottom:6px}
.login-sub{font-size:.75rem;opacity:.5;margin-bottom:36px;font-family:'DM Mono',monospace}
.google-btn{display:flex;align-items:center;justify-content:center;gap:11px;width:100%;padding:13px 20px;background:white;color:#1e293b;border:none;border-radius:12px;font-size:.9rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.google-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.3)}

/* ── HEADER ── */
#app{display:none}
.hdr{background:linear-gradient(135deg,var(--navy),var(--navy-light));color:#fff;padding:14px 24px 12px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.hdr-r1{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.hdr-title{font-size:1rem;font-weight:700;letter-spacing:-.2px}
.hdr-sub{font-size:.68rem;opacity:.5;font-family:'DM Mono',monospace;margin-top:1px}
.hdr-user{display:flex;align-items:center;gap:8px}
.avatar{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.3);font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover}
.user-name{font-size:.75rem;opacity:.8}
.sync-wrap{display:flex;align-items:center;gap:5px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;transition:background .3s;flex-shrink:0}
.sync-dot.saving{background:#60a5fa;animation:pulse .8s ease-in-out infinite}
.sync-dot.error{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-lbl{font-size:.65rem;opacity:.55;font-family:'DM Mono',monospace}
.signout-btn{font-size:.68rem;opacity:.4;cursor:pointer;background:none;border:none;color:white;font-family:'DM Sans',sans-serif;padding:0;transition:opacity .2s}

/* ── TABS ── */
.tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border);padding:0 18px;overflow-x:auto;scrollbar-width:none;gap:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:12px 15px;font-size:.8rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:var(--slate);white-space:nowrap;transition:all .2s;margin-bottom:-2px;display:flex;align-items:center;gap:6px;user-select:none}
.tab:hover{color:var(--text)}
.tab.t-resumo.active{color:var(--navy);border-color:var(--navy)}
.tab.t-ced.active{color:var(--teal);border-color:var(--teal)}
.tab.t-neo.active{color:var(--sky);border-color:var(--sky)}
.tab.t-go.active{color:var(--violet);border-color:var(--violet)}
.tab.t-pato.active{color:var(--rose);border-color:var(--rose)}
.tab.t-imago.active{color:#d97706;border-color:#d97706}
.tab.t-sfc.active{color:#059669;border-color:#059669}

/* ── PANELS ── */
.panels{padding:24px;max-width:1000px;margin:0 auto}
.panel{display:none; animation: fadeIn 0.4s ease-out forwards;}.panel.active{display:block}
.error-box{background:#fee2e2;border:1px solid #fca5a5;color:#b91c1c;padding:20px;border-radius:12px;margin-bottom:20px}

/* ── DASHBOARD GERAL ── */
.dash-grid-top{display:grid;grid-template-columns:1fr 1.5fr;gap:16px;margin-bottom:24px}
@media(max-width:768px){.dash-grid-top{grid-template-columns:1fr}}
.dash-card{background:var(--surface);border-radius:16px;padding:20px;border:1px solid var(--border);box-shadow:0 4px 12px rgba(0,0,0,.03)}
.dash-title{font-size:.85rem;font-weight:700;color:var(--slate);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.cd-timer{font-size:2rem;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace;line-height:1}
.cd-labels{display:flex;gap:15px;margin-top:6px;font-size:.75rem;color:var(--slate);font-weight:600}
.prog-val{font-size:1.8rem;font-weight:700;color:var(--teal);line-height:1}

/* Input Global do PI */
.global-pi-box{display:flex;align-items:center;gap:12px;background:#f8fafc;padding:12px 16px;border-radius:12px;border:1px dashed #cbd5e1;margin-bottom:24px}
.global-pi-box label{font-weight:700;color:var(--slate);font-size:0.85rem}
.global-pi-box input{width:80px;padding:8px;border:1px solid #94a3b8;border-radius:8px;font-family:'DM Mono',monospace;font-size:1rem;text-align:center;color:var(--navy);font-weight:700}

/* ── CARDS DE DISCIPLINA (DASHBOARD) ── */
.disc-cards-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));gap:16px;margin-bottom:24px}
.d-card{background:var(--surface);border-radius:16px;padding:20px;border:1px solid var(--border);box-shadow:0 4px 12px rgba(0,0,0,.04);transition:transform 0.2s, box-shadow 0.2s;display:flex;flex-direction:column;gap:14px;cursor:pointer}
.d-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.08)}
.d-card-header{display:flex;justify-content:space-between;align-items:flex-start}
.d-card-title{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.d-card-nota{background:#f1f5f9;padding:6px 12px;border-radius:12px;text-align:center;min-width:60px}
.d-card-nota .lbl{font-size:0.6rem;color:var(--slate);text-transform:uppercase;font-weight:700;margin-bottom:2px}
.d-card-nota .val{font-size:1.1rem;font-weight:700;font-family:'DM Mono',monospace}
.d-card-pediatria{grid-column:1 / -1; background:linear-gradient(to right, #f0f9ff, #fff); border:2px solid #bae6fd;}

/* Mini Gráfico de Barras de Nota */
.g-track{width:100%;height:12px;background:#e2e8f0;border-radius:6px;position:relative;overflow:hidden}
.g-fill-min{height:100%;position:absolute;left:0;top:0;border-radius:6px;z-index:2;transition:width 0.8s cubic-bezier(0.4, 0, 0.2, 1); animation: growBar 1s ease-out}
.g-fill-max{height:100%;position:absolute;left:0;top:0;opacity:0.25;border-radius:6px;z-index:1;transition:width 0.8s cubic-bezier(0.4, 0, 0.2, 1)}
.g-thresh{width:2px;height:16px;background:var(--rose);position:absolute;left:50%;top:-2px;z-index:3}
.g-labels{display:flex;justify-content:space-between;font-size:.65rem;font-family:'DM Mono',monospace;color:var(--slate);font-weight:600;margin-top:4px}
.st-badge{padding:3px 8px;border-radius:6px;font-size:.65rem;font-weight:700;display:inline-block;white-space:nowrap}
.st-badge.ok{background:#dcfce7;color:#166534}.st-badge.warn{background:#fef3c7;color:#92400e}.st-badge.danger{background:#fee2e2;color:#b91c1c}.st-badge.neut{background:#f1f5f9;color:#64748b}

/* Mini Barra de Progresso do Checklist */
.mini-track{height:6px;background:var(--border);border-radius:4px;overflow:hidden}
.mini-fill{height:100%;border-radius:4px;transition:width 0.8s ease; animation: growBar 1s ease-out}
.prog-labels{display:flex;justify-content:space-between;font-size:.7rem;font-weight:700;color:var(--slate);margin-top:4px;margin-bottom:8px}

/* Contadores de Estado (Pills no Dashboard) */
.state-counts{display:flex;gap:6px;justify-content:space-between}
.sc-pill{flex:1;text-align:center;padding:4px 0;border-radius:8px;font-size:0.75rem;font-weight:700;border:1px solid transparent;display:flex;flex-direction:column;gap:2px}
.sc-pill .icon{font-size:0.9rem}
.sc-pill.s-0{background:#f1f5f9;color:#64748b;border-color:#e2e8f0}
.sc-pill.s-1{background:#fef08a;color:#854d0e;border-color:#facc15}
.sc-pill.s-2{background:#fed7aa;color:#9a3412;border-color:#fb923c}
.sc-pill.s-3{background:#bbf7d0;color:#166534;border-color:#4ade80}

/* ── PÁGINA DA DISCIPLINA ── */
.grades-input-panel{background:#fff;border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:24px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;box-shadow:0 4px 12px rgba(0,0,0,.02)}

/* Calc Info Box */
.calc-info-box{width:100%;background:#f0f9ff;border:1px solid #bae6fd;color:#0369a1;padding:12px 16px;border-radius:10px;font-size:0.8rem;margin-bottom:12px;line-height:1.4}
.calc-info-box strong{color:#075985}

.grade-box{display:flex;flex-direction:column;gap:4px; margin-bottom: 8px;}
.grade-box label{font-size:.7rem;font-weight:700;color:var(--slate); white-space:nowrap;}
.grade-box input{width:85px;padding:8px;border:2px solid #e2e8f0;border-radius:8px;font-family:'DM Mono',monospace;font-size:.95rem;outline:none;transition:all .2s;text-align:center;font-weight:700}
.grade-box input:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(2,132,199,0.1)}
.grade-result-box{margin-left:auto;text-align:right;min-width:200px}

/* Seções e Títulos Editáveis */
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:8px;gap:10px}
.editable-title{padding:2px 6px;border-radius:6px;border:1px solid transparent;transition:all 0.2s;outline:none;font-size:1.1rem;font-weight:700;color:var(--text)}
.editable-title:hover{border-color:var(--border);background:#f8fafc}
.editable-title:focus{border-color:var(--sky);background:#fff}

/* ── METODOLOGIA DE REVISÃO (BADGES INTERATIVOS) ── */
.checklist{background:var(--surface);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.03),0 0 0 1px var(--border);overflow:hidden;min-height:20px;margin-bottom:24px}
.item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f1f5f9;cursor:grab;transition:background .2s;-webkit-tap-highlight-color:transparent}
.item.dragging{opacity:0.4;background:#e2e8f0}
.item:hover{background:#f8fafc}

.cb-badge{
  min-width:95px; padding:6px 10px; border-radius:12px; font-size:0.7rem; font-weight:700; text-align:center; cursor:pointer; user-select:none; transition:all 0.2s ease; border:1px solid transparent; font-family:'DM Sans',sans-serif; flex-shrink:0;
}
.cb-badge:hover{transform:scale(1.05)}
.cb-badge:active{transform:scale(0.95)}
.cb-badge.s-0{background:#f1f5f9;color:#64748b;border-color:#e2e8f0}
.cb-badge.s-1{background:#fef08a;color:#854d0e;border-color:#facc15}
.cb-badge.s-2{background:#fed7aa;color:#9a3412;border-color:#fb923c}
.cb-badge.s-3{background:#bbf7d0;color:#166534;border-color:#4ade80}

.item.done .itext{color:#94a3b8;text-decoration:line-through;text-decoration-color:#4ade80}
.itext{font-size:.88rem;line-height:1.4;color:var(--text);flex:1;font-weight:500}

.item-actions{display:none;margin-left:auto}
.item:hover .item-actions{display:flex}
.del-btn{background:#fee2e2;border:1px solid #fca5a5;color:#b91c1c;border-radius:8px;padding:6px 10px;font-size:0.75rem;cursor:pointer;font-weight:700;transition:all 0.2s}
.del-btn:hover{background:#ef4444;color:#fff}
.add-btn{width:100%;border:2px dashed #cbd5e1;background:transparent;padding:12px;border-radius:12px;color:var(--slate);font-weight:700;font-size:0.85rem;cursor:pointer;transition:all 0.2s}
.add-btn:hover{border-color:var(--teal);color:var(--teal);background:#f0fdfa}

</style>
</head>

// ── STATE ──────────────────────────────────────────────────
let userDisciplines = [];
let userGrades = { pi: '' };
let activeTab = 'resumo';
let currentUser = null;
let saveTimer = null;

const genId = () => Math.random().toString(36).substr(2, 9);

// ── AUTH & DATA ────────────────────────────────────────────
auth.onAuthStateChanged(async user => {
  if (user) {
    currentUser = user;
    document.getElementById('user-name').textContent = (user.displayName || 'Usuário').split(' ')[0];
    await loadFromFirestore();
    showScreen('app');
    startCountdown();
    renderAll();
  } else { showScreen('login'); }
});

function signIn() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => alert(e.message)); }
function doSignOut() { if(confirm('Sair da conta?')) auth.signOut(); }
function showScreen(which) {
  document.getElementById('loading-screen').style.display = which === 'loading' ? 'flex' : 'none';
  document.getElementById('login-screen').style.display  = which === 'login'   ? 'flex' : 'none';
  document.getElementById('app').style.display           = which === 'app'     ? 'block': 'none';
}

async function loadFromFirestore() {
  try {
    const snap = await db.collection('users').doc(currentUser.uid).collection('checklist').doc('data').get();
    if (snap.exists) {
      const data = snap.data();
      userDisciplines = data.userDisciplines || buildInitialData();
      userGrades = data.userGrades || { pi: '' };
      
      userDisciplines.forEach(d => {
        const templateDisc = TEMPLATE_DISCIPLINES.find(t => t.id === d.id);
        if (templateDisc) { 
          d.assessments = templateDisc.assessments; 
          d.piWeight = templateDisc.piWeight; 
          d.calcDesc = templateDisc.calcDesc;
        }
        if (d.sections) d.sections.forEach(s => s.items.forEach(i => { if(typeof i.done === 'boolean' && i.status === undefined) i.status = i.done ? 3 : 0; }));
      });
      TEMPLATE_DISCIPLINES.forEach(td => { if (!userDisciplines.find(d => d.id === td.id)) userDisciplines.push(JSON.parse(JSON.stringify(td))); });
    } else { userDisciplines = buildInitialData(); }
  } catch(e) { console.error("Erro ao carregar dados:", e); userDisciplines = buildInitialData(); }
}

function buildInitialData() {
  let cloned = JSON.parse(JSON.stringify(TEMPLATE_DISCIPLINES));
  cloned.forEach(d => d.sections.forEach(s => { s.items = s.items.map(lbl => ({ id: genId(), label: lbl, status: 0 })); }));
  return cloned;
}

function scheduleSave() {
  const dot = document.getElementById('sync-dot');
  if(dot) dot.className = 'sync-dot saving';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await db.collection('users').doc(currentUser.uid).collection('checklist').doc('data')
        .set({ userDisciplines, userGrades, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
      if(dot) dot.className = 'sync-dot';
    } catch(e) { if(dot) dot.className = 'sync-dot error'; }
  }, 800);
}

// ── LÓGICA DE NOTAS (Acumulada Absoluta) ──────────────────
function getSubjectGrades(dId) { return userGrades[dId] || {}; }

function calcSubjectMetrics(dId) {
  const d = userDisciplines.find(x => x.id === dId);
  if (!d || !d.assessments || d.assessments.length === 0) return { atual: 0, min: 0, max: 0, status: "Sem dados", cls: "neut", color: d?d.color:'#ccc' };
  
  const grades = getSubjectGrades(dId);
  let absoluteScore = 0, missingWeight = 0;
  
  d.assessments.forEach(av => {
    let valStr = grades[av.id];
    if(valStr === '' || valStr === undefined) { 
      missingWeight += av.weight; 
    } else { 
      let val = parseFloat(valStr);
      if(isNaN(val)) val = 0;
      const maxInput = av.max || 10;
      let normalizedVal = (val / maxInput) * 10;
      absoluteScore += normalizedVal * av.weight; 
    }
  });

  const valPIStr = userGrades.pi;
  const piWeight = d.piWeight || 0;
  
  if (valPIStr === '' || valPIStr === undefined) { 
    missingWeight += piWeight; 
  } else { 
    let valPI = parseFloat(valPIStr);
    if(isNaN(valPI)) valPI = 0;
    absoluteScore += valPI * piWeight; 
  }
  
  // A nota "Média Parcial" reflete a "Nota Acumulada Absoluta" (Soma dos pontos ganhos até agora)
  const mediaAtual = absoluteScore; 
  const subMin = absoluteScore; 
  const subMax = absoluteScore + (10 * missingWeight);
  
  let statusStr = '', statusCls = '';
  if(subMax < 5.0) { statusStr = 'Reprovado'; statusCls = 'danger'; } 
  else if(subMin >= 5.0) { statusStr = 'Aprovado (Garantido)'; statusCls = 'ok'; } 
  else {
    if (missingWeight > 0) {
       const avgNeeded = (5.0 - absoluteScore) / missingWeight;
       if (avgNeeded > 10) { statusStr = 'Reprovado (Impossível atingir)'; statusCls = 'danger'; } 
       else { statusStr = `Precisa de média ${avgNeeded.toFixed(1)} nas restantes`; statusCls = 'warn'; }
    }
  }

  return { 
    atualNum: mediaAtual, atual: mediaAtual.toFixed(2), 
    minNum: subMin, min: subMin.toFixed(2), 
    maxNum: subMax, max: subMax.toFixed(2), 
    status: statusStr, cls: statusCls, color: d.color
  };
}

function calcPediatria() {
  const ced = calcSubjectMetrics('ced'), neo = calcSubjectMetrics('neo');
  const minPed = (ced.minNum + neo.minNum) / 2;
  const maxPed = (ced.maxNum + neo.maxNum) / 2;
  const atualPed = (ced.atualNum + neo.atualNum) / 2;
  
  let statusStr = '', statusCls = '';
  if (ced.maxNum < 5.0 || neo.maxNum < 5.0) { statusStr = 'Reprovado (Módulo < 5)'; statusCls = 'danger'; } 
  else if (minPed >= 5.0) { statusStr = 'Aprovado no Módulo Pediatria!'; statusCls = 'ok'; } 
  else { statusStr = `Média atual em evolução`; statusCls = 'warn'; }

  return { atualNum: atualPed, atual: atualPed.toFixed(2), minNum: minPed, min: minPed.toFixed(2), maxNum: maxPed, max: maxPed.toFixed(2), status: statusStr, cls: statusCls, color: '#0ea5e9' };
}

// ── COMPONENTES VISUAIS ────────────────────────────────────
function renderGradeBar(metrics) {
  const pMin = (metrics.minNum / 10) * 100;
  const pMax = (metrics.maxNum / 10) * 100;
  return `
    <div style="margin-top:8px">
      <div class="g-track">
        <div class="g-thresh"></div>
        <div class="g-fill-min" style="width:${pMin}%; background:${metrics.color}"></div>
        <div class="g-fill-max" style="width:${pMax}%; background:${metrics.color}"></div>
      </div>
      <div class="g-labels"><span>0</span><span>${metrics.atual} (Acumulado)</span><span>10</span></div>
    </div>
  `;
}

// ── LÓGICA DE PROGRESSO ────────────────────────────────────
function getDiscProgress(d) {
  let score=0, max=0, counts=[0,0,0,0];
  if(d.sections) {
    d.sections.forEach(s => {
      if(!s.items) return;
      s.items.forEach(i => {
        let st = i.status || 0;
        counts[st]++; score += st; max += 3;
      });
    });
  }
  return { score, max, counts, pct: max ? Math.round((score/max)*100) : 0 };
}

function globalProgress() {
  let score = 0, max = 0;
  userDisciplines.forEach(d => { let p = getDiscProgress(d); score += p.score; max += p.max; });
  return { pct: max ? Math.round((score/max)*100) : 0 };
}

// ── RENDERIZAÇÃO PROTEGIDA (ANTI-CRASH) ────────────────────
function renderAll() {
  try {
    renderTabs();
    const panels = document.getElementById('panels');
    if(panels) {
      panels.innerHTML = `<div class="panel ${activeTab === 'resumo' ? 'active' : ''}" id="panel-resumo">${renderResumo()}</div>` +
        userDisciplines.map(d => `<div class="panel ${activeTab === d.id ? 'active' : ''}" id="panel-${d.id}">${renderDiscPanel(d)}</div>`).join('');
    }
  } catch (err) {
    console.error("Erro fatal na renderização:", err);
    document.getElementById('panels').innerHTML = `<div class="error-box"><b>🚨 Erro na interface!</b><br><i>${err.message}</i>.</div>`;
  }
}

function renderTabs() {
  const all = [{ id:'resumo', label:'Dashboard', cls:'resumo' }, ...userDisciplines];
  document.getElementById('tabs').innerHTML = all.map(t => {
    const active = t.id === activeTab ? `t-${t.cls || t.id} active` : '';
    return `<div class="tab t-${t.cls || t.id} ${active}" onclick="switchTab('${t.id}')">${t.emoji || '📊'} ${t.label}</div>`;
  }).join('');
}

function renderResumo() {
  const { pct } = globalProgress();
  
  let cardsHtml = userDisciplines.map(d => {
    const m = calcSubjectMetrics(d.id);
    const p = getDiscProgress(d);
    return `
      <div class="d-card" onclick="switchTab('${d.id}')" style="border-top: 4px solid ${d.color}">
        <div class="d-card-header">
          <div class="d-card-title">${d.emoji} ${d.label}</div>
          <div class="d-card-nota">
            <div class="lbl">Acumulado</div>
            <div class="val" style="color:${d.color}">${m.atual}</div>
          </div>
        </div>
        
        <div>
          <div class="prog-labels"><span>Progresso da Matéria</span><span>${p.pct}%</span></div>
          <div class="mini-track"><div class="mini-fill" style="width:${p.pct}%; background:${d.color}"></div></div>
        </div>

        <div class="state-counts">
          <div class="sc-pill s-0"><div class="icon">📚</div>${p.counts[0]}</div>
          <div class="sc-pill s-1"><div class="icon">✅</div>${p.counts[1]}</div>
          <div class="sc-pill s-2"><div class="icon">🔄</div>${p.counts[2]}</div>
          <div class="sc-pill s-3"><div class="icon">⭐</div>${p.counts[3]}</div>
        </div>
        
        <div style="margin-top:4px">
          ${renderGradeBar(m)}
          <div style="text-align:right; margin-top:6px"><span class="st-badge ${m.cls}">${m.status}</span></div>
        </div>
      </div>
    `;
  }).join('');

  const ped = calcPediatria();
  const pedCard = `
    <div class="d-card d-card-pediatria">
      <div class="d-card-header">
        <div class="d-card-title">🧸 Módulo Unificado de Pediatria (CeD + Neonato)</div>
        <div class="d-card-nota" style="background:#fff"><div class="lbl">Acumulado</div><div class="val" style="color:#0284c7">${ped.atual}</div></div>
      </div>
      ${renderGradeBar(ped)}
      <div style="text-align:right; margin-top:6px"><span class="st-badge ${ped.cls}">${ped.status}</span></div>
    </div>
  `;

  return `
    <div class="dash-grid-top">
      <div class="dash-card">
        <div class="dash-title">⏳ Contagem Regressiva (18/07/26)</div>
        <div class="cd-timer" id="cd-val">--:--:--</div>
        <div class="cd-labels"><span>DIAS</span><span>HORAS</span><span>MIN</span></div>
      </div>
      <div class="dash-card">
        <div class="dash-title">📈 Visão Geral do Semestre</div>
        <div class="prog-val">${pct}% <span style="font-size:1rem;color:var(--slate);font-weight:600">Completado Globalmente</span></div>
        <div class="bar-track-dark"><div class="bar-fill-dark" style="width:${pct}%"></div></div>
      </div>
    </div>

    <div class="global-pi-box">
      <label>⭐ Nota Projeto Integrador (PI):</label>
      <input type="number" step="0.1" value="${userGrades.pi}" placeholder="0-10" onblur="updateGlobalPI(this.value)">
      <span style="font-size:0.75rem; color:var(--slate); margin-left:10px">Vale até 20% dependendo da matéria. Digite de 0 a 10.</span>
    </div>
    
    <div class="disc-cards-grid">
      ${pedCard}
      ${cardsHtml}
    </div>
  `;
}

function renderDiscPanel(d) {
  const grades = getSubjectGrades(d.id);
  const m = calcSubjectMetrics(d.id);
  
  const assessments = d.assessments || [];
  const inputsHtml = assessments.map(av => `
    <div class="grade-box">
      <label title="${av.label}">${av.label}</label>
      <input type="number" step="0.1" max="${av.max||10}" value="${grades[av.id]!==undefined?grades[av.id]:''}" placeholder="Máx: ${av.max||10}" onblur="updateGrade('${d.id}', '${av.id}', this.value)">
    </div>
  `).join('');
  
  const sections = d.sections || [];
  const sectionsHtml = sections.map((s,si) => renderSection(d,s,si)).join('');
  
  return `
    <div class="disc-header">
      <div class="disc-title" style="color:${d.color}; font-size:1.4rem">${d.emoji} ${d.fullLabel}</div>
    </div>
    
    <div class="grades-input-panel">
      ${d.calcDesc ? `<div class="calc-info-box"><strong>ℹ️ Como funciona a nota:</strong> ${d.calcDesc}</div>` : ''}
      ${inputsHtml}
      <div class="grade-result-box">
        <div style="font-size:0.75rem; color:var(--slate); font-weight:700">Nota Acumulada</div>
        <div style="font-size:1.8rem; font-weight:700; color:${d.color}; font-family:'DM Mono',monospace">${m.atual}</div>
        ${renderGradeBar(m)}
        <div style="text-align:right; margin-top:8px"><span class="st-badge ${m.cls}">${m.status}</span></div>
      </div>
    </div>
    ${sectionsHtml}
  `;
}

function renderSection(d, s, si) {
  const items = s.items || [];
  const { score, max } = getDiscProgress({sections:[s]});
  const pct = max ? Math.round((score/max)*100) : 0;
  
  const itemsHtml = items.map(item => {
    const state = REV_STATES[item.status || 0];
    return `
      <div class="item ${item.status === 3 ? 'done' : ''}" data-id="${item.id}" draggable="true" ondragstart="dragStart(event, '${d.id}', ${si}, '${item.id}')">
        <div class="cb-badge ${state.cls}" onclick="cycleStatus('${d.id}', ${si}, '${item.id}')">
          ${state.label}
        </div>
        <div class="itext">${item.label}</div>
        <div class="item-actions"><button class="del-btn" onclick="deleteItem('${d.id}', ${si}, '${item.id}')">Excluir</button></div>
      </div>
    `;
  }).join('');
  
  return `<div class="section" id="sec-${d.id}-${si}">
    <div class="sec-head">
      <div class="sec-title"><span class="editable-title" contenteditable="true" onblur="updateTitle('${d.id}', ${si}, this.innerText)">${s.title}</span></div>
      <div style="font-size:0.85rem; font-family:'DM Mono', monospace; font-weight:700; color:var(--slate)">${pct}% Concluído</div>
    </div>
    <div class="mini-track" style="margin-bottom:16px; height:8px"><div class="mini-fill" style="width:${pct}%;background:${d.color}"></div></div>
    <div class="checklist" ondragover="event.preventDefault()" ondrop="drop(event, '${d.id}', ${si})">${itemsHtml}</div>
    <button class="add-btn" onclick="addItem('${d.id}', ${si})">+ Adicionar tópico de estudo</button>
  </div>`;
}

// ── INTERACTIONS ──
function switchTab(id) { activeTab = id; renderAll(); window.scrollTo(0,0); }
function cycleStatus(dId, si, itemId) {
  let d = userDisciplines.find(x => x.id === dId);
  let item = d.sections[si].items.find(i => i.id === itemId);
  if(item) { item.status = ((item.status || 0) + 1) % 4; scheduleSave(); renderAll(); }
}
function updateGlobalPI(val) { userGrades.pi = val; scheduleSave(); renderAll(); }
function updateGrade(dId, avId, val) { if(!userGrades[dId]) userGrades[dId] = {}; userGrades[dId][avId] = val; scheduleSave(); renderAll(); }
function updateTitle(dId, si, text) { text = text.trim(); if(!text) return; userDisciplines.find(x => x.id === dId).sections[si].title = text; scheduleSave(); }
function addItem(dId, si) {
  let text = prompt('Nome do novo tópico:');
  if(text && text.trim()) { userDisciplines.find(x => x.id === dId).sections[si].items.push({ id: genId(), label: text.trim(), status: 0 }); scheduleSave(); renderAll(); }
}
function deleteItem(dId, si, itemId) {
  if(confirm('Tem certeza que deseja excluir este tópico?')) {
    let s = userDisciplines.find(x => x.id === dId).sections[si];
    s.items = s.items.filter(i => i.id !== itemId); scheduleSave(); renderAll();
  }
}

// ── DRAG & DROP ──
let dragContext = null;
function dragStart(e, dId, si, itemId) { dragContext = { dId, si, itemId }; e.dataTransfer.setData('text/plain', itemId); setTimeout(() => e.target.classList.add('dragging'), 0); }
function drop(e, targetDId, targetSi) {
  e.preventDefault(); if(!dragContext || dragContext.dId !== targetDId) return alert("Só é possível arrastar dentro da mesma matéria.");
  let d = userDisciplines.find(x => x.id === targetDId);
  let srcSec = d.sections[dragContext.si]; let tgtSec = d.sections[targetSi];
  let itemIdx = srcSec.items.findIndex(i => i.id === dragContext.itemId);
  if(itemIdx === -1) return;
  let [movedItem] = srcSec.items.splice(itemIdx, 1);
  let dropTarget = e.target.closest('.item');
  if(dropTarget) {
    let tIdx = tgtSec.items.findIndex(i => i.id === dropTarget.dataset.id);
    if(tIdx !== -1) tgtSec.items.splice(tIdx, 0, movedItem); else tgtSec.items.push(movedItem);
  } else { tgtSec.items.push(movedItem); }
  dragContext = null; scheduleSave(); renderAll();
}

// ── COUNTDOWN ──
function startCountdown() {
  const target = new Date('2026-07-18T23:59:59').getTime();
  setInterval(() => {
    const now = new Date().getTime(); const diff = target - now;
    const el = document.getElementById('cd-val'); if(!el) return;
    if(diff < 0) { el.textContent = "FIM!"; return; }
    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    el.textContent = `${d.toString().padStart(2,'0')}:${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
  }, 1000);
}
