<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist – MED 117 2026.1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1f3d;--navy-light:#244080;
  --teal:#0d9488;--teal-l:#14b8a6;
  --sky:#0284c7;--violet:#7c3aed;--rose:#e11d48;
  --slate:#64748b;--slate-l:#94a3b8;
  --bg:#f1f5f9;--surface:#fff;--border:#e2e8f0;--text:#1e293b;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* ── LOADING & LOGIN ── */
#loading-screen{position:fixed;inset:0;background:linear-gradient(135deg,var(--navy),var(--navy-light));display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:16px}
.spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,.2);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:rgba(255,255,255,.5);font-size:.78rem;font-family:'DM Mono',monospace}
#login-screen{display:none;position:fixed;inset:0;background:linear-gradient(135deg,var(--navy),var(--navy-light));align-items:center;justify-content:center;padding:24px;z-index:999}
.login-card{text-align:center;color:white;max-width:320px;width:100%}
.login-emoji{font-size:2.8rem;margin-bottom:14px}
.login-title{font-size:1.25rem;font-weight:700;margin-bottom:6px}
.login-sub{font-size:.75rem;opacity:.5;margin-bottom:36px;font-family:'DM Mono',monospace}
.google-btn{display:flex;align-items:center;justify-content:center;gap:11px;width:100%;padding:13px 20px;background:white;color:#1e293b;border:none;border-radius:12px;font-size:.9rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.google-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.3)}

/* ── APP & HEADER ── */
#app{display:none}
.hdr{background:linear-gradient(135deg,var(--navy),var(--navy-light));color:#fff;padding:14px 24px 12px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.hdr-r1{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.hdr-title{font-size:1rem;font-weight:700;letter-spacing:-.2px}
.hdr-sub{font-size:.68rem;opacity:.5;font-family:'DM Mono',monospace;margin-top:1px}
.hdr-user{display:flex;align-items:center;gap:8px}
.avatar{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.3);font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover}
.user-name{font-size:.75rem;opacity:.8}
.sync-wrap{display:flex;align-items:center;gap:5px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;transition:background .3s;flex-shrink:0}
.sync-dot.saving{background:#60a5fa;animation:pulse .8s ease-in-out infinite}
.sync-dot.error{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-lbl{font-size:.65rem;opacity:.55;font-family:'DM Mono',monospace}
.signout-btn{font-size:.68rem;opacity:.4;cursor:pointer;background:none;border:none;color:white;font-family:'DM Sans',sans-serif;padding:0;transition:opacity .2s}
.signout-btn:hover{opacity:.9}
.hdr-r2{display:flex;align-items:center;gap:10px}
.bar-track{flex:1;height:6px;background:rgba(255,255,255,.18);border-radius:10px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--teal-l),#34d399);border-radius:10px;transition:width .5s ease}
.hdr-pct{font-size:.82rem;font-weight:700;font-family:'DM Mono',monospace;min-width:32px;text-align:right}
.hdr-of{font-size:.65rem;opacity:.5;font-family:'DM Mono',monospace;white-space:nowrap}

/* ── TABS ── */
.tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border);padding:0 18px;overflow-x:auto;scrollbar-width:none;gap:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:12px 15px;font-size:.8rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:var(--slate);white-space:nowrap;transition:all .2s;margin-bottom:-2px;display:flex;align-items:center;gap:6px;user-select:none}
.tab:hover{color:var(--text)}
.tab.t-resumo.active{color:var(--navy);border-color:var(--navy)}
.tab.t-ced.active{color:var(--teal);border-color:var(--teal)}
.tab.t-neo.active{color:var(--sky);border-color:var(--sky)}
.tab.t-go.active{color:var(--violet);border-color:var(--violet)}
.tab.t-pato.active{color:var(--rose);border-color:var(--rose)}
.tab.t-imago.active{color:#d97706;border-color:#d97706}
.tab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tab-cnt{font-size:.66rem;font-family:'DM Mono',monospace;opacity:.6}

/* ── PANELS & RESUMO ── */
.panels{padding:20px 24px 60px;max-width:860px;margin:0 auto}
.panel{display:none}.panel.active{display:block}
.resumo-intro{font-size:.78rem;color:var(--slate);margin-bottom:16px;background:var(--surface);border-radius:10px;padding:10px 14px;border:1px solid var(--border)}
.exam-row{background:var(--surface);border-radius:12px;box-shadow:0 1px 5px rgba(0,0,0,.06),0 0 0 1px var(--border);margin-bottom:9px;display:flex;align-items:stretch;overflow:hidden;transition:box-shadow .15s}
.exam-row:hover{box-shadow:0 3px 12px rgba(0,0,0,.1),0 0 0 1px var(--border)}
.exam-stripe{width:5px;flex-shrink:0}
.exam-body{flex:1;padding:11px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.exam-date{font-size:.68rem;font-weight:700;font-family:'DM Mono',monospace;white-space:nowrap;min-width:65px;color:var(--slate)}
.exam-name{flex:1;font-size:.83rem;font-weight:600;min-width:150px}
.exam-bar-wrap{width:150px;display:flex;flex-direction:column;gap:4px}
.exam-bar-bg{height:6px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.exam-bar-f{height:100%;border-radius:4px;transition:width .4s ease}
.exam-bar-labels{display:flex;justify-content:space-between}
.exam-pct{font-size:.7rem;font-weight:700;font-family:'DM Mono',monospace}
.exam-cnt{font-size:.65rem;color:var(--slate);font-family:'DM Mono',monospace}
.acc-tag{font-size:.6rem;background:#f1f5f9;color:var(--slate);border:1px solid var(--border);padding:1px 6px;border-radius:6px;white-space:nowrap;flex-shrink:0}
.na-tag{font-size:.7rem;color:var(--slate-l);font-style:italic}
.month-sep{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--slate-l);margin:16px 0 8px;padding-left:4px}

/* ── DISCIPLINE & NEW FEATURES (EDIT, DRAG, ADD, DEL) ── */
.disc-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.disc-title{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.disc-stats{font-size:.78rem;color:var(--slate);font-family:'DM Mono',monospace}
.section{margin-bottom:22px}
.sec-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:10px}
.sec-title{font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:7px;flex-wrap:wrap;line-height:1.3}

/* Editable Titles */
.editable-title{padding:2px 6px;border-radius:6px;border:1px solid transparent;transition:all 0.2s;outline:none}
.editable-title:hover{border-color:var(--border);background:#f8fafc}
.editable-title:focus{border-color:var(--sky);background:#fff;box-shadow:0 0 0 2px rgba(2,132,199,0.2)}

.exam-tag{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:6px;font-family:'DM Mono',monospace;white-space:nowrap;flex-shrink:0}
.sec-count{font-size:.72rem;color:var(--slate);font-family:'DM Mono',monospace;white-space:nowrap;flex-shrink:0}
.mini-track{height:3px;background:var(--border);border-radius:4px;margin-bottom:10px;overflow:hidden}
.mini-fill{height:100%;border-radius:4px;transition:width .4s ease}
.tag-red{background:#fee2e2;color:#b91c1c}
.tag-amber{background:#fef3c7;color:#92400e}
.tag-purple{background:#ede9fe;color:#5b21b6}
.tag-green{background:#dcfce7;color:#166534}

.checklist{background:var(--surface);border-radius:12px;box-shadow:0 1px 5px rgba(0,0,0,.06),0 0 0 1px var(--border);overflow:hidden;min-height:20px}
.item{display:flex;align-items:flex-start;gap:12px;padding:11px 16px;border-bottom:1px solid #f1f5f9;cursor:grab;transition:background .12s, opacity .2s;-webkit-tap-highlight-color:transparent;user-select:none}
.item:active{cursor:grabbing}
.item.dragging{opacity:0.4;background:#e2e8f0}
.item:last-child{border-bottom:none}
.item:hover{background:#f8fafc}
.item.done{background:#f0fdf4}
.item.done .itext{color:#86efac;text-decoration:line-through;text-decoration-color:#4ade80}
.cb{width:20px;height:20px;border:2px solid #cbd5e1;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s ease;margin-top:1px;background:white}
.item.done .cb{background:#22c55e;border-color:#22c55e}
.cbchk{opacity:0;transition:opacity .15s}
.item.done .cbchk{opacity:1}
.itext{font-size:.84rem;line-height:1.45;color:var(--text);flex:1}

/* Actions (Add/Del) */
.item-actions{display:none;margin-left:auto;align-items:center}
.item:hover .item-actions{display:flex}
.del-btn{background:#fee2e2;border:1px solid #fca5a5;color:#b91c1c;border-radius:6px;padding:4px 8px;font-size:0.7rem;cursor:pointer;transition:all 0.2s}
.del-btn:hover{background:#f87171;color:white}
.add-btn{width:100%;border:2px dashed #cbd5e1;background:transparent;padding:10px;border-radius:8px;color:var(--slate);font-weight:600;font-size:0.8rem;cursor:pointer;transition:all 0.2s;margin-top:10px;font-family:'DM Sans',sans-serif}
.add-btn:hover{border-color:var(--teal);color:var(--teal);background:#f0fdfa}

.note{background:#fffbeb;border:1px solid #fcd34d;border-radius:10px;padding:10px 14px;font-size:.77rem;color:#78350f;margin-bottom:16px}
.reset-btn{display:block;margin:0 auto 8px;padding:7px 16px;background:none;border:1px solid var(--border);border-radius:8px;font-size:.74rem;color:var(--slate);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.reset-btn:hover{background:#fee2e2;border-color:#fca5a5;color:#b91c1c}

@media(max-width:600px){
  .hdr{padding:12px 14px 10px}.panels{padding:14px 12px 60px}
  .exam-bar-wrap{width:110px}.tabs{padding:0 8px}.exam-name{min-width:120px}
  .item-actions{display:flex;opacity:0.3} /* sempre visível (fraquinho) no celular */
}
</style>
</head>

let userDisciplines = [];
let activeTab = 'resumo';
let currentUser = null;
let saveTimer = null;
let dragContext = null;

const genId = () => Math.random().toString(36).substr(2, 9);

// ── AUTH ───────────────────────────────────────────────────
auth.onAuthStateChanged(async user => {
  if (user) {
    currentUser = user;
    updateUserUI(user);
    await loadFromFirestore();
    showScreen('app');
    try { renderAll(); } catch (e) { console.error("Erro render:", e); }
  } else {
    showScreen('login');
  }
});

function signIn() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(e => alert('Erro: ' + e.message));
}

function doSignOut() {
  if (!confirm('Sair da conta?')) return;
  auth.signOut();
  userDisciplines = [];
  showScreen('login');
}

function updateUserUI(user) {
  document.getElementById('user-name').textContent = (user.displayName || user.email || 'U').split(' ')[0];
  document.getElementById('user-avatar').innerHTML = user.photoURL
    ? `<img src="${user.photoURL}" alt="">` : (user.displayName || 'U').charAt(0).toUpperCase();
}

function showScreen(which) {
  document.getElementById('loading-screen').style.display = which === 'loading' ? 'flex' : 'none';
  document.getElementById('login-screen').style.display  = which === 'login'   ? 'flex' : 'none';
  document.getElementById('app').style.display           = which === 'app'     ? 'block': 'none';
}

// ── FIRESTORE & DATA MIGRATION ─────────────────────────────
async function loadFromFirestore() {
  try {
    const snap = await db.collection('users').doc(currentUser.uid).collection('checklist').doc('data').get();
    if (snap.exists) {
      const data = snap.data();
      if (data.userDisciplines) {
        userDisciplines = data.userDisciplines;
      } else if (data.checked) {
        userDisciplines = migrateLegacyData(data.checked);
      } else {
        userDisciplines = buildInitialData();
      }
    } else {
      userDisciplines = buildInitialData();
    }
  } catch(e) {
    console.error('Erro load:', e);
    userDisciplines = buildInitialData();
  }
}

function buildInitialData() {
  let cloned = JSON.parse(JSON.stringify(TEMPLATE_DISCIPLINES));
  cloned.forEach(d => d.sections.forEach(s => {
    s.items = s.items.map(lbl => ({ id: genId(), label: lbl, done: false }));
  }));
  return cloned;
}

function migrateLegacyData(oldChecked) {
  let cloned = JSON.parse(JSON.stringify(TEMPLATE_DISCIPLINES));
  cloned.forEach(d => d.sections.forEach((s, si) => {
    s.items = s.items.map((lbl, ii) => ({ id: genId(), label: lbl, done: !!oldChecked[`${d.id}.${si}.${ii}`] }));
  }));
  return cloned;
}

function scheduleSave() {
  setSyncStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await db.collection('users').doc(currentUser.uid).collection('checklist').doc('data')
        .set({ userDisciplines, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
      setSyncStatus('saved');
    } catch(e) { setSyncStatus('error'); }
  }, 800);
}

function setSyncStatus(s) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-lbl');
  if(!dot) return;
  dot.className = 'sync-dot' + (s === 'saving' ? ' saving' : s === 'error' ? ' error' : '');
  lbl.textContent = s === 'saving' ? 'salvando...' : s === 'error' ? 'erro ✕' : 'salvo ✓';
}

// ── HELPERS (STATS) ────────────────────────────────────────
function secStats(items) {
  if (!items || !Array.isArray(items)) return { done: 0, total: 0 }; 
  let done = items.filter(i => i.done).length;
  return { done, total: items.length };
}

function examStats(exam) {
  if (!exam || !exam.refs || !exam.refs.length) return null;
  let done = 0, total = 0;
  exam.refs.forEach(({d,s}) => {
    const disc = userDisciplines.find(x => x.id === d);
    if (!disc || !disc.sections || !disc.sections[s]) return;
    const st = secStats(disc.sections[s].items);
    done += st.done; total += st.total;
  });
  return { done, total, pct: total ? Math.round((done/total)*100) : 0 };
}

function overallStats() {
  let done = 0, total = 0;
  userDisciplines.forEach(d => {
    if(!d.sections) return;
    d.sections.forEach((s) => {
      const st = secStats(s.items);
      done += st.done; total += st.total;
    });
  });
  return { done, total, pct: total ? Math.round((done/total)*100) : 0 };
}

function discStats(d) {
  let done = 0, total = 0;
  if(!d.sections) return { done: 0, total: 0 };
  d.sections.forEach((s) => { 
    const st = secStats(s.items); 
    done += st.done; total += st.total; 
  });
  return { done, total };
}

// ── RENDERIZAÇÃO ───────────────────────────────────────────
function renderTabs() {
  const all = [
    { id:'resumo', label:'Resumo', emoji:'📊', cls:'resumo', dot:'#0f1f3d' },
    ...userDisciplines.map(d => ({ id:d.id, label:d.label, emoji:d.emoji, cls:d.id, dot:d.color, stats:discStats(d) }))
  ];
  
  document.getElementById('tabs').innerHTML = all.map(t => {
    const active = t.id === activeTab ? `t-${t.cls} active` : '';
    const cnt = t.stats ? `<span class="tab-cnt">${t.stats.done}/${t.stats.total}</span>` : '';
    return `<div class="tab t-${t.cls} ${active}" onclick="switchTab('${t.id}')">
      <span class="tab-dot" style="background:${t.dot || '#94a3b8'}"></span>${t.emoji} ${t.label}${cnt}</div>`;
  }).join('');
}

function renderResumo() {
  let prevMonth = '';
  const rows = (EXAM_MAP || []).map(exam => {
    const stats = examStats(exam);
    const color = COLORS[exam.cls] || '#94a3b8';
    const fill  = FILLS[exam.cls]  || '#cbd5e1';
    let sep = '';
    
    if (exam.month !== prevMonth) { sep = `<div class="month-sep">— ${exam.month}</div>`; prevMonth = exam.month; }
    
    const progress = !stats
      ? `<span class="na-tag">${exam.note || '–'}</span>`
      : `<div class="exam-bar-wrap"><div class="exam-bar-bg"><div class="exam-bar-f" style="width:${stats.pct}%;background:${fill}"></div></div>
          <div class="exam-bar-labels"><span class="exam-pct" style="color:${color}">${stats.pct}%</span><span class="exam-cnt">${stats.done}/${stats.total} tópicos</span></div></div>`;
          
    const acc = exam.accumulated ? '<span class="acc-tag">acumulativo</span>' : '';
    return `${sep}<div class="exam-row"><div class="exam-stripe" style="background:${color}"></div><div class="exam-body">
        <div class="exam-date">${exam.date}</div><div class="exam-name">${exam.full} ${acc}</div>${progress}</div></div>`;
  }).join('');
  return `<div class="resumo-intro">ℹ️ Cada barra mostra o % dos tópicos daquela avaliação já estudados. Provas <b>acumulativas</b> somam o conteúdo de provas anteriores.</div>${rows}`;
}

function renderDiscPanel(d) {
  const { done, total } = discStats(d);
  const sectionsHtml = (d.sections || []).map((s,si) => renderSection(d,s,si)).join('');
  
  return `
    <div class="disc-header">
      <div class="disc-title" style="color:${d.color}">
        ${d.emoji} <span class="editable-title" contenteditable="true" onblur="updateTitle('${d.id}', null, this.innerText)">${d.fullLabel}</span>
      </div>
      <div class="disc-stats">${done}/${total} tópicos</div>
    </div>
    ${d.note ? `<div class="note">ℹ️ ${d.note}</div>` : ''}
    ${sectionsHtml}
    <button class="reset-btn" onclick="resetDisc('${d.id}')">🗑 Limpar checks de ${d.label}</button>`;
}

function renderSection(d, s, si) {
  const { done, total } = secStats(s.items);
  const pct = total ? Math.round((done/total)*100) : 0;
  const itemsHtml = (s.items || []).map((item) => renderItem(d,si,item)).join('');
  
  return `<div class="section" id="sec-${d.id}-${si}">
    <div class="sec-head">
      <div class="sec-title">
        <span class="editable-title" contenteditable="true" onblur="updateTitle('${d.id}', ${si}, this.innerText)">${s.title}</span>
        <span class="exam-tag ${s.tagClass || ''}">📅 ${s.exam || 'N/A'}</span>
      </div>
      <div class="sec-count">${done}/${total}</div>
    </div>
    <div class="mini-track"><div class="mini-fill" style="width:${pct}%;background:${d.fill}"></div></div>
    
    <div class="checklist" ondragover="dragOver(event)" ondrop="drop(event, '${d.id}', ${si})">
      ${itemsHtml}
    </div>
    <button class="add-btn" onclick="addItem('${d.id}', ${si})">+ Adicionar tópico</button>
  </div>`;
}

function renderItem(d, si, item) {
  return `<div class="item ${item.done ? 'done' : ''}" data-id="${item.id}" draggable="true" ondragstart="dragStart(event, '${d.id}', ${si}, '${item.id}')" onclick="toggle('${d.id}', ${si}, '${item.id}')">
    <div class="cb"><svg class="cbchk" width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="itext">${item.label}</div>
    <div class="item-actions">
      <button class="del-btn" onclick="deleteItem(event, '${d.id}', ${si}, '${item.id}')">🗑️ Excluir</button>
    </div>
  </div>`;
}

function renderAll() {
  renderTabs();
  const panelsContainer = document.getElementById('panels');
  if (panelsContainer) {
    panelsContainer.innerHTML = `<div class="panel ${activeTab === 'resumo' ? 'active' : ''}" id="panel-resumo">${renderResumo()}</div>` +
      userDisciplines.map(d => `<div class="panel ${activeTab === d.id ? 'active' : ''}" id="panel-${d.id}">${renderDiscPanel(d)}</div>`).join('');
  }
  updateOverall();
}

function updateOverall() {
  const { done, total, pct } = overallStats();
  if(document.getElementById('overall-fill')) document.getElementById('overall-fill').style.width = pct + '%';
  if(document.getElementById('hdr-pct')) document.getElementById('hdr-pct').textContent = pct + '%';
  if(document.getElementById('hdr-of')) document.getElementById('hdr-of').textContent = `${done}/${total} tópicos`;
}

// ── INTERACTIONS & NOVAS FUNÇÕES (EDIT, ADD, DEL, DRAG) ────
function switchTab(id) {
  activeTab = id;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('panel-'+id);
  if (panel) { if(id === 'resumo') panel.innerHTML = renderResumo(); panel.classList.add('active'); }
  renderTabs();
}

function toggle(dId, si, itemId) {
  let d = userDisciplines.find(x => x.id === dId);
  let item = d.sections[si].items.find(i => i.id === itemId);
  if(item) {
    item.done = !item.done;
    scheduleSave();
    
    // Atualiza apenas a sessão visualmente para evitar piscar toda a tela
    const el = document.getElementById(`sec-${dId}-${si}`);
    if (el) el.outerHTML = renderSection(d, d.sections[si], si);
    
    const dh = document.querySelector(`#panel-${dId} .disc-stats`);
    if (dh) { const st = discStats(d); dh.textContent = `${st.done}/${st.total} tópicos`; }
    
    updateOverall();
    renderTabs();
    if (activeTab === 'resumo') { const rp = document.getElementById('panel-resumo'); if(rp) rp.innerHTML = renderResumo(); }
  }
}

function updateTitle(dId, si, newTitle) {
  let text = newTitle.trim();
  if(!text) return; // ignora se tentar deixar vazio
  let d = userDisciplines.find(x => x.id === dId);
  
  if (si === null) {
     d.fullLabel = text; // Título da matéria
  } else {
     d.sections[si].title = text; // Título do bloco
  }
  scheduleSave();
  // Nao chamamos renderAll() direto para nao roubar o foco do cursor se a pessoa clicou em outro lugar
}

function addItem(dId, si) {
  let text = prompt('Nome do novo tópico de estudo:');
  if (!text || !text.trim()) return;
  
  let d = userDisciplines.find(x => x.id === dId);
  d.sections[si].items.push({ id: genId(), label: text.trim(), done: false });
  scheduleSave();
  renderAll();
}

function deleteItem(event, dId, si, itemId) {
  event.stopPropagation(); // impede de marcar/desmarcar o item ao clicar na lixeira
  if (!confirm('Tem certeza que deseja excluir este tópico?')) return;
  
  let d = userDisciplines.find(x => x.id === dId);
  d.sections[si].items = d.sections[si].items.filter(i => i.id !== itemId);
  scheduleSave();
  renderAll();
}

// ── DRAG AND DROP ──────────────────────────────────────────
function dragStart(e, dId, si, itemId) {
  dragContext = { dId, si, itemId };
  e.dataTransfer.setData('text/plain', itemId);
  setTimeout(() => e.target.classList.add('dragging'), 0); // timeout pro navegador poder fazer o "ghost" da imagem original
}

function dragOver(e) {
  e.preventDefault(); // Necessário para permitir o drop
}

function drop(e, targetDId, targetSi) {
  e.preventDefault();
  if (!dragContext) return;
  if (dragContext.dId !== targetDId) {
    alert("Só é possível arrastar tópicos entre blocos da mesma matéria.");
    return;
  }
  
  let d = userDisciplines.find(x => x.id === targetDId);
  let sourceSec = d.sections[dragContext.si];
  let targetSec = d.sections[targetSi];

  let itemIndex = sourceSec.items.findIndex(i => i.id === dragContext.itemId);
  if(itemIndex === -1) return;

  let [movedItem] = sourceSec.items.splice(itemIndex, 1);

  // Calcula se vai jogar no meio (baseado em onde soltou) ou no final da lista
  let dropTarget = e.target.closest('.item');
  if (dropTarget) {
     let targetItemId = dropTarget.dataset.id;
     let tIndex = targetSec.items.findIndex(i => i.id === targetItemId);
     if (tIndex !== -1) {
         targetSec.items.splice(tIndex, 0, movedItem);
     } else {
         targetSec.items.push(movedItem);
     }
  } else {
     targetSec.items.push(movedItem); // Se soltou no vazio do bloco, vai pro final
  }

  scheduleSave();
  renderAll();
  dragContext = null;
}

function resetDisc(dId) {
  if (!confirm(`Apagar todos os checks de ${dId}?`)) return;
  let d = userDisciplines.find(x => x.id === dId);
  d.sections.forEach(s => s.items.forEach(i => i.done = false));
  scheduleSave();
  renderAll();
}
</script>
