<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard – MED 117 2026.1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1f3d;--navy-light:#244080;
  --teal:#0d9488;--teal-l:#14b8a6;
  --sky:#0284c7;--violet:#7c3aed;--rose:#e11d48;
  --slate:#64748b;--slate-l:#94a3b8;
  --bg:#f1f5f9;--surface:#fff;--border:#e2e8f0;--text:#1e293b;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* ── LOADING & LOGIN ── */
#loading-screen, #login-screen{position:fixed;inset:0;background:linear-gradient(135deg,var(--navy),var(--navy-light));display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:16px}
#login-screen{display:none;padding:24px;z-index:999}
.spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,.2);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:rgba(255,255,255,.5);font-size:.78rem;font-family:'DM Mono',monospace}
.login-card{text-align:center;color:white;max-width:320px;width:100%}
.login-emoji{font-size:2.8rem;margin-bottom:14px}
.login-title{font-size:1.25rem;font-weight:700;margin-bottom:6px}
.login-sub{font-size:.75rem;opacity:.5;margin-bottom:36px;font-family:'DM Mono',monospace}
.google-btn{display:flex;align-items:center;justify-content:center;gap:11px;width:100%;padding:13px 20px;background:white;color:#1e293b;border:none;border-radius:12px;font-size:.9rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.google-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.3)}

/* ── APP & HEADER ── */
#app{display:none}
.hdr{background:linear-gradient(135deg,var(--navy),var(--navy-light));color:#fff;padding:14px 24px 12px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.hdr-r1{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.hdr-title{font-size:1rem;font-weight:700;letter-spacing:-.2px}
.hdr-sub{font-size:.68rem;opacity:.5;font-family:'DM Mono',monospace;margin-top:1px}
.hdr-user{display:flex;align-items:center;gap:8px}
.avatar{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.3);font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover}
.user-name{font-size:.75rem;opacity:.8}
.sync-wrap{display:flex;align-items:center;gap:5px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;transition:background .3s;flex-shrink:0}
.sync-dot.saving{background:#60a5fa;animation:pulse .8s ease-in-out infinite}
.sync-dot.error{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-lbl{font-size:.65rem;opacity:.55;font-family:'DM Mono',monospace}
.signout-btn{font-size:.68rem;opacity:.4;cursor:pointer;background:none;border:none;color:white;font-family:'DM Sans',sans-serif;padding:0;transition:opacity .2s}

/* ── TABS ── */
.tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border);padding:0 18px;overflow-x:auto;scrollbar-width:none;gap:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:12px 15px;font-size:.8rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:var(--slate);white-space:nowrap;transition:all .2s;margin-bottom:-2px;display:flex;align-items:center;gap:6px;user-select:none}
.tab:hover{color:var(--text)}
.tab.t-resumo.active{color:var(--navy);border-color:var(--navy)}
.tab.t-ced.active{color:var(--teal);border-color:var(--teal)}
.tab.t-neo.active{color:var(--sky);border-color:var(--sky)}
.tab.t-go.active{color:var(--violet);border-color:var(--violet)}
.tab.t-pato.active{color:var(--rose);border-color:var(--rose)}
.tab.t-imago.active{color:#d97706;border-color:#d97706}
.tab.t-sfc.active{color:#059669;border-color:#059669}
.tab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── PANELS & DASHBOARD ── */
.panels{padding:20px 24px 60px;max-width:960px;margin:0 auto}
.panel{display:none}.panel.active{display:block}

/* Countdown & Overview */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:768px){.dash-grid{grid-template-columns:1fr}}
.dash-card{background:var(--surface);border-radius:12px;padding:18px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.dash-title{font-size:.85rem;font-weight:700;color:var(--slate);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.cd-timer{font-size:2rem;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace;line-height:1}
.cd-labels{display:flex;gap:15px;margin-top:6px;font-size:.75rem;color:var(--slate);font-weight:600}

/* Progress Global */
.prog-val{font-size:1.8rem;font-weight:700;color:var(--teal);line-height:1}
.prog-sub{font-size:.8rem;color:var(--slate);margin-top:4px}
.bar-track-dark{height:8px;background:var(--border);border-radius:10px;overflow:hidden;margin-top:12px}
.bar-fill-dark{height:100%;background:linear-gradient(90deg,var(--teal-l),#34d399);border-radius:10px;transition:width .5s ease}

/* Boletim / Notas Table */
.boletim-table{width:100%;border-collapse:collapse;font-size:.8rem;margin-top:8px}
.boletim-table th{text-align:left;padding:8px;color:var(--slate);border-bottom:2px solid var(--border);font-weight:600}
.boletim-table td{padding:10px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.boletim-table tr:last-child td{border-bottom:none}
.st-badge{padding:3px 8px;border-radius:6px;font-size:.7rem;font-weight:700}
.st-badge.ok{background:#dcfce7;color:#166534}
.st-badge.warn{background:#fef3c7;color:#92400e}
.st-badge.danger{background:#fee2e2;color:#b91c1c}

/* Grades Input Panel */
.grades-input-panel{background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:24px;display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end}
.grade-box{display:flex;flex-direction:column;gap:6px}
.grade-box label{font-size:.75rem;font-weight:700;color:var(--slate)}
.grade-box input{width:70px;padding:8px;border:1px solid #cbd5e1;border-radius:6px;font-family:'DM Mono',monospace;font-size:.9rem;outline:none;transition:border .2s}
.grade-box input:focus{border-color:var(--sky)}
.grade-result{margin-left:auto;text-align:right}
.grade-result-val{font-size:1.4rem;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace}
.grade-result-lbl{font-size:.7rem;color:var(--slate)}

/* ── DISCIPLINE & SECTIONS ── */
.disc-header{margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.disc-title{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.section{margin-bottom:22px}
.sec-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:10px}
.sec-title{font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.editable-title{padding:2px 6px;border-radius:6px;border:1px solid transparent;transition:all 0.2s;outline:none}
.editable-title:hover{border-color:var(--border);background:#f8fafc}
.editable-title:focus{border-color:var(--sky);background:#fff}

.exam-tag{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:6px;font-family:'DM Mono',monospace;white-space:nowrap}
.mini-track{height:4px;background:var(--border);border-radius:4px;margin-bottom:10px;overflow:hidden}
.mini-fill{height:100%;border-radius:4px;transition:width .4s ease}

/* ── CHECKLIST (Spaced Repetition) ── */
.checklist{background:var(--surface);border-radius:12px;box-shadow:0 1px 5px rgba(0,0,0,.06),0 0 0 1px var(--border);overflow:hidden;min-height:20px}
.item{display:flex;align-items:flex-start;gap:12px;padding:11px 16px;border-bottom:1px solid #f1f5f9;cursor:grab;transition:background .12s, opacity .2s;user-select:none}
.item.dragging{opacity:0.4;background:#e2e8f0}
.item:hover{background:#f8fafc}

/* Status Checkboxes */
.cb-status{width:26px;height:26px;border:2px solid #cbd5e1;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s ease;font-size:.65rem;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace}
.cb-status.s-0{background:#fff;color:transparent}
.cb-status.s-1{background:#fef08a;border-color:#facc15;color:#854d0e} /* Estudado */
.cb-status.s-2{background:#fed7aa;border-color:#fb923c;color:#9a3412} /* Rev 1 */
.cb-status.s-3{background:#bbf7d0;border-color:#4ade80;color:#166534} /* Rev 2 */

.item.done .itext{color:#94a3b8;text-decoration:line-through;text-decoration-color:#4ade80}
.itext{font-size:.84rem;line-height:1.45;color:var(--text);flex:1;margin-top:3px}

.item-actions{display:none;margin-left:auto;align-items:center}
.item:hover .item-actions{display:flex}
.del-btn{background:#fee2e2;border:1px solid #fca5a5;color:#b91c1c;border-radius:6px;padding:4px 8px;font-size:0.7rem;cursor:pointer}
.add-btn{width:100%;border:2px dashed #cbd5e1;background:transparent;padding:10px;border-radius:8px;color:var(--slate);font-weight:600;font-size:0.8rem;cursor:pointer;margin-top:10px}
</style>
</head>
<body>

<div id="loading-screen"><div class="spinner"></div><div class="loading-txt">carregando...</div></div>

<div id="login-screen">
  <div class="login-card">
    <div class="login-emoji">🎓</div>
    <div class="login-title">Dashboard MED 117</div>
    <div class="login-sub">UnB · 2026.1</div>
    <button class="google-btn" onclick="signIn()">Entrar com Google</button>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-r1">
      <div>
        <div class="hdr-title">🎓 Dashboard – 7º Semestre</div>
        <div class="hdr-sub">MED 117 · UnB · 2026.1</div>
      </div>
      <div class="hdr-user">
        <div class="sync-wrap"><div class="sync-dot" id="sync-dot"></div><span class="sync-lbl" id="sync-lbl">salvo</span></div>
        <div class="avatar" id="user-avatar"></div>
        <span class="user-name" id="user-name"></span>
        <button class="signout-btn" onclick="doSignOut()">sair</button>
      </div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="panels" id="panels"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ══════════════════════════════════════════════════════════
//  🔧 FIREBASE CONFIG
// ══════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyBf3ZgjZ4W_Vr2XaWRHurU2I3cDpJeLLFs",
  authDomain:        "checklist-d7a01.firebaseapp.com",
  projectId:         "checklist-d7a01",
  storageBucket:     "checklist-d7a01.firebasestorage.app",
  messagingSenderId: "829528262319",
  appId:             "1:829528262319:web:8929dc37ecd62e8a8c765a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
db.enablePersistence().catch(() => {});

// ── TEMPLATE E EMENTAS ────────────────────────────────────
const TEMPLATE_DISCIPLINES = [
  {
    id:'ced', label:'CeD', emoji:'👶', fullLabel:'Crescimento e Desenvolvimento',
    color:'#0d9488', fill:'#14b8a6',
    assessments: [{id:'av1', label:'Teórica 1'}, {id:'av2', label:'Teórica 2'}, {id:'av3', label:'Prática'}],
    sections:[
      { title:'1ª Avaliação Teórica', items:['Semiologia Pediátrica','Crescimento na primeira infância','Aleitamento Materno e Nutrição','Imunização na primeira Infância','Desenvolvimento neuromotor','Transtornos do Desenvolvimento'] },
      { title:'2ª Avaliação Teórica', items:['Principais Acidentes na Infância','Síndromes Genéticas','Problemas Auditivos','Anemia Ferropriva','Doenças Respiratórias e Alergias','Principais Doenças Gastrointestinais','Imunodeficiências na Infância'] }
    ]
  },
  {
    id:'neo', label:'Neonato', emoji:'🏥', fullLabel:'Módulo Neonatologia',
    color:'#0284c7', fill:'#38bdf8',
    assessments: [{id:'av1', label:'Teórica 1'}, {id:'av2', label:'Teórica 2'}, {id:'av3', label:'Prática'}],
    sections:[
      { title:'1ª Prova Teórica', items:['Fisiologia cardiovascular e respiratória','Cuidados ao recém-nascido normal','Hipóxia e reanimação neonatal','Distúrbios metabólicos','Sepse Neonatal','Icterícia e incompatibilidade','Distúrbios respiratórios I','Distúrbios respiratórios II'] },
      { title:'2ª Prova Teórica', items:['Sífilis Congênita','Toxoplasmose Congênita','Recém-nascido pré-termo I','Recém-nascido pré-termo II','Distúrbios Neurológicos no RN','Malformações Congênitas'] }
    ]
  },
  {
    id:'go', label:'GO', emoji:'🩺', fullLabel:'Ginecologia & Obstetrícia',
    color:'#7c3aed', fill:'#a78bfa',
    assessments: [{id:'av1', label:'Teórica 1'}, {id:'av2', label:'Teórica 2'}, {id:'av3', label:'Prática'}],
    sections:[
      { title:'Ginecologia 1', items:['Anatomia do Trato Genital','Anamnese e Exame Físico','Ciclo menstrual','Desenvolvimento puberal','Amenorreias','Endometriose','SOP','Infertilidade','Vulvovaginites','Contracepção I','Patologia de ovário'] },
      { title:'Obstetrícia 1', items:['Avaliação pré-concepcional','Diagnóstico de gravidez','Endocrinologia da gravidez','Fisiologia Materna','Pré-natal','Mecanismos do parto','Distocias','Puerpério','Amamentação','Sangramento 1ª e 2ª metade'] },
      { title:'Ginecologia 2', items:['Cirurgia ginecológica','Contracepção II','Patologia da mama','Climatério e Menopausa','Câncer de endométrio','Sangramento Uterino Anormal','Câncer do colo uterino','Pessoas trans'] },
      { title:'Obstetrícia 2', items:['Violência Obstétrica','RPMO e Parto pré-termo','Infecções na gestação','Diabetes e Gestação','Síndromes Hipertensivas','CIUR','Gemelaridade'] }
    ]
  },
  {
    id:'sfc', label:'SFC', emoji:'🤝', fullLabel:'Saúde, Família e Comunidade 4',
    color:'#059669', fill:'#10b981',
    assessments: [{id:'av1', label:'Av. Teórica'}, {id:'av2', label:'Ativ. Prática'}],
    sections:[
      { title:'Saúde da Mulher na APS', items:['PNAISM e Abordagem na APS','Sofrimento Mental e Violência','Planejamento Reprodutivo','Pré-natal de risco habitual','Cuidados no Puerpério','Climatério e Menopausa','Rastreamento câncer colo/mama'] },
      { title:'Saúde da Criança na APS', items:['Política Nacional da Criança e Puericultura','Patologias mais comuns na infância','Saúde do Pré-escolar e Escolar'] },
      { title:'Populações Específicas', items:['Saúde LGBTQIAPN+ e Práticas de Cuidado','Documentações (Cadernetas, SOAP)','Discussão de Casos na UBS'] }
    ]
  },
  {
    id:'pato', label:'Pato 3', emoji:'🔬', fullLabel:'Patologia Sistêmica 3',
    color:'#e11d48', fill:'#fb7185',
    assessments: [{id:'av1', label:'Útero'}, {id:'av2', label:'Mama'}, {id:'av3', label:'Ovário'}, {id:'av4', label:'Prova Final'}],
    sections:[
      { title:'Módulos Práticos / Relatórios', items:['Patologia do Útero e Colo Uterino','Carcinomas de Mama e Lesões Benignas','Tumores de Ovário e Tuba Uterina','Doenças Trofoblásticas e Eclâmpsia'] }
    ]
  },
  {
    id:'imago', label:'Imago', emoji:'🩻', fullLabel:'Imaginologia',
    color:'#d97706', fill:'#fbbf24',
    assessments: [{id:'av1', label:'Prova 1'}, {id:'av2', label:'Prova 2'}, {id:'av3', label:'Prova 3'}, {id:'av4', label:'Prova 4'}],
    sections:[
      { title:'Conteúdos', items:['Física dos métodos e Contrastes','Tórax e Mama','Neurorradiologia e Coluna','Obstetrícia e Pediatria','Abdome e Pelve','Vascular e Musculoesquelético'] }
    ]
  }
];

// ── STATE ──────────────────────────────────────────────────
let userDisciplines = [];
let userGrades = { pi: '' };
let activeTab = 'resumo';
let currentUser = null;
let saveTimer = null;

const genId = () => Math.random().toString(36).substr(2, 9);

// ── AUTH & DATA ────────────────────────────────────────────
auth.onAuthStateChanged(async user => {
  if (user) {
    currentUser = user;
    document.getElementById('user-name').textContent = (user.displayName || 'Usuário').split(' ')[0];
    await loadFromFirestore();
    showScreen('app');
    startCountdown();
    renderAll();
  } else { showScreen('login'); }
});

function signIn() {
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => alert(e.message));
}
function doSignOut() {
  if(confirm('Sair da conta?')) auth.signOut();
}
function showScreen(which) {
  document.getElementById('loading-screen').style.display = which === 'loading' ? 'flex' : 'none';
  document.getElementById('login-screen').style.display  = which === 'login'   ? 'flex' : 'none';
  document.getElementById('app').style.display           = which === 'app'     ? 'block': 'none';
}

async function loadFromFirestore() {
  try {
    const snap = await db.collection('users').doc(currentUser.uid).collection('checklist').doc('data').get();
    if (snap.exists) {
      const data = snap.data();
      userDisciplines = data.userDisciplines || buildInitialData();
      userGrades = data.userGrades || { pi: '' };
      
      // MIGRATION: Injeta o array de provas caso você esteja vindo de uma versão antiga do site
      userDisciplines.forEach(d => {
        const templateDisc = TEMPLATE_DISCIPLINES.find(t => t.id === d.id);
        if (!d.assessments && templateDisc) {
          d.assessments = templateDisc.assessments;
        }
        // Migração do checkbox simples pro sistema de revisão
        if (d.sections) {
          d.sections.forEach(s => s.items.forEach(i => {
            if(typeof i.done === 'boolean' && i.status === undefined) i.status = i.done ? 3 : 0;
          }));
        }
      });
      
    } else { userDisciplines = buildInitialData(); }
  } catch(e) { userDisciplines = buildInitialData(); }
}

function buildInitialData() {
  let cloned = JSON.parse(JSON.stringify(TEMPLATE_DISCIPLINES));
  cloned.forEach(d => d.sections.forEach(s => {
    s.items = s.items.map(lbl => ({ id: genId(), label: lbl, status: 0 }));
  }));
  return cloned;
}

function scheduleSave() {
  const dot = document.getElementById('sync-dot');
  if(dot) dot.className = 'sync-dot saving';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await db.collection('users').doc(currentUser.uid).collection('checklist').doc('data')
        .set({ userDisciplines, userGrades, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
      if(dot) dot.className = 'sync-dot';
    } catch(e) { if(dot) dot.className = 'sync-dot error'; }
  }, 800);
}

// ── LÓGICA DE NOTAS (Exceção Imago) ─────────────────────────
function getSubjectGrades(dId) {
  if(!userGrades[dId]) userGrades[dId] = {};
  return userGrades[dId];
}

function calcSubjectMetrics(dId) {
  const d = userDisciplines.find(x => x.id === dId);
  // Proteção extra caso alguma matéria nova seja criada e não tenha avaliações
  if (!d || !d.assessments || d.assessments.length === 0) return { atual: "0.00", min: "0.00", max: "0.00", status: "Sem provas", cls: "" };
  
  const grades = getSubjectGrades(dId);
  let totalSoma = 0, countPreenchido = 0;
  
  d.assessments.forEach(av => {
    let val = parseFloat(grades[av.id]);
    if(!isNaN(val)) { totalSoma += val; countPreenchido++; }
  });

  const totalProvas = d.assessments.length;
  const numFaltantes = totalProvas - countPreenchido;
  const mediaParcialDasProvas = countPreenchido > 0 ? (totalSoma / countPreenchido) : 0;
  const valPI = parseFloat(userGrades.pi) || 0;
  
  let mediaAtual, subMin, subMax, targetNeeded;

  if(dId === 'imago') {
    mediaAtual = mediaParcialDasProvas;
    subMin = (totalSoma / totalProvas);
    subMax = (totalSoma + (10 * numFaltantes)) / totalProvas;
    targetNeeded = (5.0 * totalProvas) - totalSoma;
  } else {
    mediaAtual = (mediaParcialDasProvas * 0.9) + (valPI * 0.1);
    subMin = (totalSoma / totalProvas) * 0.9 + (valPI * 0.1);
    subMax = ((totalSoma + (10 * numFaltantes)) / totalProvas) * 0.9 + (valPI * 0.1);
    targetNeeded = (((5.0 - (valPI * 0.1)) / 0.9) * totalProvas) - totalSoma;
  }
  
  let statusStr = '', statusCls = '';
  if(subMax < 5.0) { statusStr = 'Reprovado'; statusCls = 'danger'; }
  else if(subMin >= 5.0) { statusStr = 'Aprovado (MM)'; statusCls = 'ok'; }
  else {
    statusStr = countPreenchido < totalProvas ? `Faltam ${targetNeeded.toFixed(1)} pts` : 'Reprovado';
    statusCls = 'warn';
  }

  return { 
    atual: mediaAtual.toFixed(2), min: subMin.toFixed(2), max: subMax.toFixed(2), 
    status: statusStr, cls: statusCls 
  };
}

// ── LÓGICA DE PROGRESSO ────────────────────────────────────
function getProgress(items) {
  if(!items || items.length === 0) return { score: 0, max: 0 };
  let score = items.reduce((acc, i) => acc + (i.status || 0), 0);
  return { score, max: items.length * 3 };
}

function globalProgress() {
  let score = 0, max = 0;
  userDisciplines.forEach(d => {
    if (d.sections) {
      d.sections.forEach(s => {
        const p = getProgress(s.items);
        score += p.score; max += p.max;
      });
    }
  });
  return { pct: max ? Math.round((score/max)*100) : 0 };
}

// ── RENDERIZAÇÃO ───────────────────────────────────────────
function renderTabs() {
  const all = [{ id:'resumo', label:'Dashboard', cls:'resumo' }, ...userDisciplines];
  document.getElementById('tabs').innerHTML = all.map(t => {
    const active = t.id === activeTab ? `t-${t.cls || t.id} active` : '';
    return `<div class="tab t-${t.cls || t.id} ${active}" onclick="switchTab('${t.id}')">
      ${t.emoji || '📊'} ${t.label}</div>`;
  }).join('');
}

function renderResumo() {
  const { pct } = globalProgress();
  let boletimRows = userDisciplines.map(d => {
    const m = calcSubjectMetrics(d.id);
    const notaDesc = d.id === 'imago' ? '(Média Provas)' : '(90% Provas + 10% PI)';
    return `<tr>
      <td><b>${d.label}</b><br><small style="color:var(--slate)">${notaDesc}</small></td>
      <td>${m.atual}</td>
      <td style="color:#64748b">${m.min} a ${m.max}</td>
      <td><span class="st-badge ${m.cls}">${m.status}</span></td>
    </tr>`;
  }).join('');

  return `
    <div class="dash-grid">
      <div class="dash-card">
        <div class="dash-title">⏳ Fim do Semestre (18/07/26)</div>
        <div class="cd-timer" id="cd-val">--:--:--</div>
        <div class="cd-labels"><span>DIAS</span><span>HORAS</span><span>MIN</span></div>
      </div>
      <div class="dash-card">
        <div class="dash-title">📈 Progresso Geral</div>
        <div class="prog-val">${pct}% Estudado/Revisado</div>
        <div class="bar-track-dark"><div class="bar-fill-dark" style="width:${pct}%"></div></div>
      </div>
    </div>
    
    <div class="dash-card" style="margin-bottom:24px">
      <div class="dash-title">📝 Notas e Previsões (Mínimo MM = 5.0)</div>
      <div class="grade-box" style="flex-direction:row; align-items:center; margin-bottom:16px">
        <label>Nota Projeto Integrador (Geral):</label>
        <input type="number" step="0.1" value="${userGrades.pi}" placeholder="--" onblur="updateGlobalPI(this.value)">
      </div>
      <div style="overflow-x:auto">
        <table class="boletim-table">
          <thead><tr><th>Disciplina</th><th>Média Atual</th><th>Projeção</th><th>Situação</th></tr></thead>
          <tbody>${boletimRows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderDiscPanel(d) {
  const grades = getSubjectGrades(d.id);
  const m = calcSubjectMetrics(d.id);
  
  const assessments = d.assessments || [];
  const inputsHtml = assessments.map(av => `
    <div class="grade-box">
      <label>${av.label}</label>
      <input type="number" step="0.1" value="${grades[av.id]||''}" placeholder="--" onblur="updateGrade('${d.id}', '${av.id}', this.value)">
    </div>
  `).join('');
  
  const sections = d.sections || [];
  const sectionsHtml = sections.map((s,si) => renderSection(d,s,si)).join('');
  
  return `
    <div class="disc-header">
      <div class="disc-title" style="color:${d.color}">${d.emoji} ${d.fullLabel}</div>
    </div>
    <div class="grades-input-panel">
      ${inputsHtml}
      <div class="grade-result">
        <div class="grade-result-lbl">Média Atual ${d.id==='imago'?'':'(c/ PI)'}</div>
        <div class="grade-result-val">${m.atual}</div>
      </div>
    </div>
    ${sectionsHtml}
  `;
}

function renderSection(d, s, si) {
  const { score, max } = getProgress(s.items);
  const pct = max ? Math.round((score/max)*100) : 0;
  const itemsHtml = s.items.map(item => `
    <div class="item ${item.status === 3 ? 'done' : ''}" data-id="${item.id}" draggable="true" ondragstart="dragStart(event, '${d.id}', ${si}, '${item.id}')">
      <div class="cb-status s-${item.status}" onclick="cycleStatus('${d.id}', ${si}, '${item.id}')">
        ${item.status===1?'E': item.status===2?'R1': item.status===3?'R2':''}
      </div>
      <div class="itext">${item.label}</div>
      <div class="item-actions"><button class="del-btn" onclick="deleteItem('${d.id}', ${si}, '${item.id}')">🗑️</button></div>
    </div>
  `).join('');
  return `<div class="section" id="sec-${d.id}-${si}">
    <div class="sec-head">
      <div class="sec-title"><span class="editable-title" contenteditable="true" onblur="updateTitle('${d.id}', ${si}, this.innerText)">${s.title}</span></div>
      <div style="font-size:0.75rem; font-family:'DM Mono', monospace; font-weight:700; color:var(--slate)">${pct}%</div>
    </div>
    <div class="mini-track"><div class="mini-fill" style="width:${pct}%;background:${d.fill}"></div></div>
    <div class="checklist" ondragover="event.preventDefault()" ondrop="drop(event, '${d.id}', ${si})">${itemsHtml}</div>
    <button class="add-btn" onclick="addItem('${d.id}', ${si})">+ Adicionar tópico</button>
  </div>`;
}

function renderAll() {
  renderTabs();
  const panels = document.getElementById('panels');
  if(panels) {
    panels.innerHTML = `<div class="panel ${activeTab === 'resumo' ? 'active' : ''}" id="panel-resumo">${renderResumo()}</div>` +
      userDisciplines.map(d => `<div class="panel ${activeTab === d.id ? 'active' : ''}" id="panel-${d.id}">${renderDiscPanel(d)}</div>`).join('');
  }
}

// ── INTERACTIONS ──
function switchTab(id) { activeTab = id; renderAll(); }
function cycleStatus(dId, si, itemId) {
  let d = userDisciplines.find(x => x.id === dId);
  let item = d.sections[si].items.find(i => i.id === itemId);
  if(item) { item.status = ((item.status || 0) + 1) % 4; scheduleSave(); renderAll(); }
}
function updateGlobalPI(val) { userGrades.pi = val; scheduleSave(); renderAll(); }
function updateGrade(dId, avId, val) { if(!userGrades[dId]) userGrades[dId] = {}; userGrades[dId][avId] = val; scheduleSave(); renderAll(); }
function updateTitle(dId, si, text) { text = text.trim(); if(!text) return; userDisciplines.find(x => x.id === dId).sections[si].title = text; scheduleSave(); }
function addItem(dId, si) {
  let text = prompt('Nome do novo tópico:');
  if(text && text.trim()) { userDisciplines.find(x => x.id === dId).sections[si].items.push({ id: genId(), label: text.trim(), status: 0 }); scheduleSave(); renderAll(); }
}
function deleteItem(dId, si, itemId) {
  if(confirm('Excluir este tópico?')) {
    let s = userDisciplines.find(x => x.id === dId).sections[si];
    s.items = s.items.filter(i => i.id !== itemId);
    scheduleSave(); renderAll();
  }
}

// ── DRAG & DROP ──
let dragContext = null;
function dragStart(e, dId, si, itemId) { dragContext = { dId, si, itemId }; e.dataTransfer.setData('text/plain', itemId); setTimeout(() => e.target.classList.add('dragging'), 0); }
function drop(e, targetDId, targetSi) {
  e.preventDefault(); if(!dragContext || dragContext.dId !== targetDId) return alert("Arraste na mesma matéria.");
  let d = userDisciplines.find(x => x.id === targetDId);
  let srcSec = d.sections[dragContext.si];
  let tgtSec = d.sections[targetSi];
  let itemIdx = srcSec.items.findIndex(i => i.id === dragContext.itemId);
  if(itemIdx === -1) return;
  let [movedItem] = srcSec.items.splice(itemIdx, 1);
  let dropTarget = e.target.closest('.item');
  if(dropTarget) {
    let tIdx = tgtSec.items.findIndex(i => i.id === dropTarget.dataset.id);
    if(tIdx !== -1) tgtSec.items.splice(tIdx, 0, movedItem);
    else tgtSec.items.push(movedItem);
  } else { tgtSec.items.push(movedItem); }
  dragContext = null; scheduleSave(); renderAll();
}

// ── COUNTDOWN ──
function startCountdown() {
  const target = new Date('2026-07-18T23:59:59').getTime();
  setInterval(() => {
    const now = new Date().getTime(); const diff = target - now;
    const el = document.getElementById('cd-val'); if(!el) return;
    if(diff < 0) { el.textContent = "FIM!"; return; }
    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    el.textContent = `${d.toString().padStart(2,'0')}:${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
  }, 1000);
}
</script>
